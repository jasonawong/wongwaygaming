<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Crystal Match | Wong Way Gaming</title>
    <link rel="stylesheet" href="../../shared/game-shell.css">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="game-page">
      <header class="game-header">
        <a class="back-link" href="../../../">&larr; Arcade</a>
        <h1 class="game-title">Crystal Match</h1>
      </header>
      <main class="game-main">
        <aside class="info-panel">
          <p>Flip two cards at a time and match every crystal pair before the timer reaches zero.</p>
          <div class="stat-grid">
            <div class="stat"><span>Turns</span><strong id="turns">0</strong></div>
            <div class="stat"><span>Pairs</span><strong id="pairs">0/6</strong></div>
            <div class="stat"><span>Time</span><strong id="time">60</strong></div>
            <div class="stat"><span>Best</span><strong id="best">--</strong></div>
          </div>
          <p class="status-line" id="status">Memorize the shimmer.</p>
          <div class="control-row">
            <button class="game-button" id="start-button" type="button">Start</button>
            <button class="game-button secondary" id="reset-button" type="button">Shuffle</button>
          </div>
        </aside>
        <section class="stage memory-stage" aria-label="Crystal Match game">
          <div class="memory-board" id="board"></div>
        </section>
      </main>
    </div>
    <script src="game.js"></script>
  </body>
</html>
