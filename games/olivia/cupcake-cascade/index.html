<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cupcake Cascade | Wong Way Gaming</title>
    <link rel="stylesheet" href="../../shared/game-shell.css">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="game-page">
      <header class="game-header">
        <a class="back-link" href="../../../">&larr; Arcade</a>
        <h1 class="game-title">Cupcake Cascade</h1>
      </header>
      <main class="game-main">
        <aside class="info-panel">
          <p>Move the basket to catch cupcakes. Fresh cupcakes boost your combo; burnt cupcakes cost a heart.</p>
          <div class="stat-grid">
            <div class="stat"><span>Score</span><strong id="score">0</strong></div>
            <div class="stat"><span>Hearts</span><strong id="hearts">3</strong></div>
            <div class="stat"><span>Combo</span><strong id="combo">0</strong></div>
            <div class="stat"><span>Best</span><strong id="best">0</strong></div>
          </div>
          <p class="status-line" id="status">Ready to bake a high score.</p>
          <div class="control-row">
            <button class="game-button" id="start-button" type="button">Start</button>
            <button class="game-button secondary" id="reset-button" type="button">Reset</button>
          </div>
        </aside>
        <section class="stage-wrap" aria-label="Cupcake Cascade game">
          <canvas class="stage" id="game" width="900" height="675"></canvas>
          <div class="mobile-controls" aria-label="Basket controls">
            <button class="game-button secondary" id="left-button" type="button">Left</button>
            <button class="game-button secondary" id="right-button" type="button">Right</button>
          </div>
        </section>
      </main>
    </div>
    <script src="game.js"></script>
  </body>
</html>
