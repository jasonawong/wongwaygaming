<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Meteor Math | Wong Way Gaming</title>
    <link rel="stylesheet" href="../../shared/game-shell.css">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="game-page">
      <header class="game-header">
        <a class="back-link" href="../../../">&larr; Arcade</a>
        <h1 class="game-title">Meteor Math</h1>
      </header>
      <main class="game-main">
        <aside class="info-panel">
          <p>Choose the answer that matches the falling meteor. Each correct shot earns Space Credits and pushes the next meteor higher.</p>
          <div class="stat-grid">
            <div class="stat credit-stat"><span>Space Credits</span><strong id="score">0</strong></div>
            <div class="stat"><span>Shields</span><strong id="shields">3</strong></div>
            <div class="stat"><span>Streak</span><strong id="streak">0</strong></div>
            <div class="stat"><span>Best Credits</span><strong id="best">0</strong></div>
          </div>
          <div class="shop-panel" aria-label="Space Shop">
            <div class="shop-heading">
              <span>Space Shop</span>
              <strong>Spend credits</strong>
            </div>
            <div class="shop-grid">
              <button class="shop-item" id="buy-shield" type="button" data-cost="45">
                <span class="shop-icon shield-icon" aria-hidden="true"></span>
                <span><strong>Shield</strong><small>+1 shield</small></span>
                <em>45</em>
              </button>
              <button class="shop-item" id="buy-freeze" type="button" data-cost="35">
                <span class="shop-icon freeze-icon" aria-hidden="true"></span>
                <span><strong>Freeze Ray</strong><small>Pause meteor</small></span>
                <em>35</em>
              </button>
              <button class="shop-item" id="buy-bomb" type="button" data-cost="60">
                <span class="shop-icon bomb-icon" aria-hidden="true"></span>
                <span><strong>Bomb</strong><small>Skip question</small></span>
                <em>60</em>
              </button>
            </div>
            <div class="inventory-row">
              <button class="inventory-button" id="use-freeze" type="button">Freeze <strong id="freeze-count">0</strong></button>
              <button class="inventory-button" id="use-bomb" type="button">Bomb <strong id="bomb-count">0</strong></button>
            </div>
          </div>
          <p class="status-line" id="status">Start a round to load the first meteor.</p>
          <div class="control-row">
            <button class="game-button" id="start-button" type="button">Start</button>
            <button class="game-button secondary" id="reset-button" type="button">Reset</button>
          </div>
        </aside>
        <section class="stage math-stage" aria-label="Meteor Math game">
          <div class="sky">
            <div class="starfield layer-back" aria-hidden="true"></div>
            <div class="orbital-rings" aria-hidden="true"></div>
            <div class="speed-lines" aria-hidden="true"></div>
            <div class="battle-hud" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
              <span></span>
            </div>
            <div class="speed-banner" id="speed-banner" aria-hidden="true">Meteors incoming faster</div>
            <div class="beam" id="beam" aria-hidden="true"></div>
            <div class="impact-ring" id="impact-ring" aria-hidden="true"></div>
            <div class="floating-score" id="floating-score" aria-hidden="true"></div>
            <div class="ship-burst" id="ship-burst" aria-hidden="true"></div>
            <div class="game-over-banner" id="game-over-banner" aria-hidden="true">Game Over</div>
            <div class="meteor" id="meteor">
              <span class="meteor-glow" aria-hidden="true"></span>
              <span id="problem">?</span>
              <span class="meteor-crack crack-a" aria-hidden="true"></span>
              <span class="meteor-crack crack-b" aria-hidden="true"></span>
            </div>
            <div class="planet-shield" aria-hidden="true">
              <div class="planet"></div>
              <div class="shield-dome" id="shield-dome"></div>
            </div>
            <div class="space-plane" aria-hidden="true">
              <span class="wing wing-left"></span>
              <span class="wing wing-right"></span>
              <span class="fuselage"></span>
              <span class="canopy"></span>
              <span class="wing-laser laser-left"></span>
              <span class="wing-laser laser-right"></span>
              <span class="side-fin fin-left"></span>
              <span class="side-fin fin-right"></span>
              <span class="tail-fin"></span>
              <span class="engine-pod pod-left"></span>
              <span class="engine-pod pod-right"></span>
            </div>
          </div>
          <div class="answer-row" id="answers"></div>
        </section>
      </main>
    </div>
    <script src="game.js"></script>
  </body>
</html>
